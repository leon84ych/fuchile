<header class="top-menu">
  <button
    type="button"
    class="menu-button"
    [class.active]="view === 'play'"
    (click)="setView('play')"
  >
    Jugar
  </button>
  <button
    type="button"
    class="menu-button"
    [class.active]="view === 'history'"
    (click)="setView('history')"
  >
    Historial
  </button>
  <button
    type="button"
    class="menu-button"
    [class.active]="view === 'configure'"
    (click)="setView('configure')"
  >
    Unirme a una sala
  </button>
  <button
    type="button"
    class="menu-button"
    [class.active]="view === 'credits'"
    (click)="setView('credits')"
  >
    Contacto
  </button>
</header>

<main class="app-view">
  <app-batch *ngIf="view === 'play'"></app-batch>
  <app-history *ngIf="view === 'history'"></app-history>
  <app-configure *ngIf="view === 'configure'"></app-configure>
  <app-credits *ngIf="view === 'credits'"></app-credits>
</main>
