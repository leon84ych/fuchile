<section class="credits-card">
  <h2>Contáctanos</h2>
  <p>
    Contáctanos en nuestras redes sociales si querés colaborar, sugerir mejoras o simplemente saludar. ¡Gracias por jugar!
  </p>
  <div class="credits-grid">
    <div class="credits-grid-header">Nombre</div>
    <div class="credits-grid-header">Alias</div>
    <div class="credits-grid-header">Rol</div>
    <div class="credits-grid-header">GitHub</div>
    <div class="credits-grid-header">Instagram</div>
    <div class="credits-grid-header">TikTok</div>
    <div class="credits-grid-header">X</div>

    <ng-container *ngFor="let person of credits">
      <div>{{ person.name }}</div>
      <div>{{ person.nickname }}</div>
      <div>{{ person.role }}</div>
      <div>
        <a
          *ngIf="person.socials.github"
          [href]="getSocialUrl('github', person.socials.github)"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="GitHub de {{ person.name }}"
        >
          <span class="social-icon">
            <img src="/images/icons/github.png" alt="GitHub" />
          </span>
        </a>
      </div>
      <div>
        <a
          *ngIf="person.socials.instagram"
          [href]="getSocialUrl('instagram', person.socials.instagram)"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="Instagram de {{ person.name }}"
        >
          <span class="social-icon">
            <img src="/images/icons/instagram.jpeg" alt="Instagram" />
          </span>
        </a>
      </div>
      <div>
        <a
          *ngIf="person.socials['tik-tok']"
          [href]="getSocialUrl('tik-tok', person.socials['tik-tok'])"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="TikTok de {{ person.name }}"
        >
          <span class="social-icon">
            <img src="/images/icons/tiktok.jpeg" alt="TikTok" />
          </span>
        </a>
      </div>
      <div>
        <a
          *ngIf="person.socials.twitter"
          [href]="getSocialUrl('twitter', person.socials.twitter)"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="X de {{ person.name }}"
        >
          <span class="social-icon">
            <img src="/images/icons/x.jpeg" alt="X" />
          </span>
        </a>
      </div>
    </ng-container>
  </div>
</section>
