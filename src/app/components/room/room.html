<section class="room-card">
  <div class="room-header">
    <div>
      <p class="room-label">Sala</p>
      <h3>{{ roomName() || 'No conectado' }}</h3>
    </div>
  </div>

  <div class="room-users">
    <p class="room-label">Conectados ({{ totalUsers() }})</p>
    <ul>
      <li *ngFor="let nick of sortedUsers()" [class.current-user]="nick === currentNickname()">
        {{ nick }}
      </li>
      <li *ngIf="sortedUsers().length === 0">Nadie conectado aún</li>
    </ul>
  </div>

  <button class="btn-action start" *ngIf="roomName() && !batchInProgress" (click)="requestBatchStart()">
    Iniciar partida
  </button>

  <p class="room-batch-message" *ngIf="batchMessage()">{{ batchMessage() }}</p>
  <p class="room-message" *ngIf="roomMessage()">{{ roomMessage() }}</p>
</section>
