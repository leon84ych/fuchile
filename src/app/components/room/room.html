<section class="room-card">
  <div class="room-header">
    <div>
      <p class="room-label">Sala</p>
      <h3>{{ roomName() || 'No conectado' }}</h3>
    </div>
  </div>

  <div class="room-users">
    <p class="room-label">Conectados ({{ totalUsers() }})</p>
    <ul>
      <li *ngFor="let nick of sortedUsers()" [class.current-user]="nick === currentNickname()">
        {{ nick }}
      </li>
      <li *ngIf="sortedUsers().length === 0">Nadie conectado aún</li>
    </ul>
  </div>

  <ng-container *ngIf="roomName() && (!roomHost() || roomHost()===currentNickname()) && !batchInProgress">
    <div class="room-duration">
      <label for="duration-select" class="room-label">Duración de la partida</label>
      <select
        #durationSelect
        id="duration-select"
        class="duration-select"
        [value]="selectedDurationMinutes()"
        (change)="onDurationChange($event)"
      >
        <option *ngFor="let option of durationOptions" [value]="option">{{ option }}m</option>
      </select>
    </div>

    <button class="btn-action start" (click)="requestBatchStart(durationSelect.value)">
      Iniciar partida
    </button>
  </ng-container>

  <p class="room-batch-message" *ngIf="batchMessage()">{{ batchMessage() }}</p>
  <p class="room-message" *ngIf="roomMessage()">{{ roomMessage() }}</p>
</section>
