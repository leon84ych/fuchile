<section class="configure-card" *ngIf="!connected">
    <h2>Conectarme a una Sala</h2>

    <div class="form-group">
        <label for="nickname">Nick</label>
        <input id="nickname" name="nickname" type="text" [(ngModel)]="nickname"
            (ngModelChange)="onNicknameChange($event)" placeholder="Ej: leon84ych" />
    </div>

    <div class="form-group">
        <label for="room">Sala</label>
        <input id="room" name="room" type="text" [(ngModel)]="room" (ngModelChange)="onRoomChange($event)"
            placeholder="Ej: MATCH10" />
    </div>

    <div class="actions-row">
        <button type="button" class="btn-action save" (click)="saveSession()">
            Guardar y conectar
        </button>
    </div>

    <p class="status-text" [class.error]="connectionStatus.status === 'error'"
        [class.success]="connectionStatus.status === 'connected'"
        [class.connecting]="connectionStatus.status === 'connecting'">
        {{ statusMessage }}
    </p>
</section>
<section class="configure-card connected-panel" *ngIf="connected">
    <div class="connected-header">
        <h2>Conexión establecida</h2>
        <span class="badge">Sala: {{ room }}</span>
    </div>
    <p class="connected-info">Jugando como <strong>{{ nickname }}</strong></p>
    <div class="actions-row">
        <button class="btn-action exit" (click)="leaveRoom()">Salir de la Sala</button>
    </div>
    <p class="status-text status-connected">
        Disfruta tu juego
    </p>
</section>
